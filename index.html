<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kanon Strategy</title>
<style>
  *, *::before, *::after {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  :root {
    --white: #F5F5F3;
    --black: #0A0A0A;
    --grey-1: #1A1A1A;
    --grey-2: #2A2A2A;
    --grey-3: #888888;
    --grey-4: #444444;
    --accent: #E8E8E6;
  }

  html, body {
    width: 100%;
    height: 100%;
    background: var(--black);
    color: var(--white);
    font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
    overflow: hidden;
  }

  /* Subtle grid background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
    background-size: 80px 80px;
    pointer-events: none;
    z-index: 0;
  }

  /* Scan line effect */
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0,0,0,0.08) 2px,
      rgba(0,0,0,0.08) 4px
    );
    pointer-events: none;
    z-index: 0;
  }

  .container {
    position: relative;
    z-index: 1;
    width: 100%;
    height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    padding: 48px 56px;
  }

  /* TOP BAR */
  .top-bar {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
  }

  .logo-mark {
    display: flex;
    align-items: center;
    gap: 16px;
  }

  .logo-icon {
    width: 28px;
    height: 28px;
    opacity: 0.9;
  }

  .logo-text {
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: var(--white);
    opacity: 0.9;
  }

  .top-right {
    text-align: right;
  }

  .coord {
    font-size: 9px;
    letter-spacing: 2px;
    color: var(--grey-3);
    font-weight: 300;
    line-height: 1.8;
  }

  /* MAIN */
  .main {
    display: flex;
    flex-direction: column;
    gap: 0;
  }

  .eyebrow {
    font-size: 9px;
    letter-spacing: 5px;
    text-transform: uppercase;
    color: var(--grey-3);
    font-weight: 400;
    margin-bottom: 28px;
    display: flex;
    align-items: center;
    gap: 16px;
  }

  .eyebrow::before {
    content: '';
    display: block;
    width: 32px;
    height: 1px;
    background: var(--grey-4);
  }

  .headline {
    font-size: clamp(52px, 8vw, 96px);
    font-weight: 700;
    letter-spacing: -2px;
    line-height: 0.95;
    color: var(--white);
    text-transform: uppercase;
  }

  .headline .thin {
    font-weight: 200;
    color: var(--grey-3);
  }

  .headline .block {
    display: block;
  }

  .sub {
    margin-top: 40px;
    font-size: 11px;
    font-weight: 300;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--grey-3);
    max-width: 420px;
    line-height: 2;
  }

  /* BOTTOM BAR */
  .bottom-bar {
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
  }

  .bottom-left {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .contact-line {
    font-size: 9px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--grey-4);
    font-weight: 300;
  }

  .contact-email {
    font-size: 11px;
    letter-spacing: 2px;
    color: var(--grey-3);
    font-weight: 300;
    text-decoration: none;
    transition: color 0.2s;
  }

  .contact-email:hover {
    color: var(--white);
  }

  .bottom-right {
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    gap: 6px;
  }

  .status-dot {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 9px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--grey-4);
  }

  .dot {
    width: 5px;
    height: 5px;
    border-radius: 50%;
    background: var(--white);
    opacity: 0.3;
    animation: pulse 3s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 0.2; }
    50% { opacity: 0.8; }
  }

  .year {
    font-size: 9px;
    letter-spacing: 3px;
    color: var(--grey-4);
    font-weight: 300;
  }

  /* Vertical rule */
  .v-rule {
    position: fixed;
    right: 56px;
    top: 0;
    bottom: 0;
    width: 1px;
    background: linear-gradient(to bottom, transparent, rgba(255,255,255,0.06) 30%, rgba(255,255,255,0.06) 70%, transparent);
  }

  /* Horizontal rule */
  .h-rule {
    position: fixed;
    left: 0;
    right: 0;
    top: 50%;
    height: 1px;
    background: linear-gradient(to right, transparent, rgba(255,255,255,0.04) 20%, rgba(255,255,255,0.04) 80%, transparent);
  }

  /* Corner marks */
  .corner {
    position: fixed;
    width: 12px;
    height: 12px;
  }
  .corner.tl { top: 20px; left: 20px; border-top: 1px solid rgba(255,255,255,0.15); border-left: 1px solid rgba(255,255,255,0.15); }
  .corner.tr { top: 20px; right: 20px; border-top: 1px solid rgba(255,255,255,0.15); border-right: 1px solid rgba(255,255,255,0.15); }
  .corner.bl { bottom: 20px; left: 20px; border-bottom: 1px solid rgba(255,255,255,0.15); border-left: 1px solid rgba(255,255,255,0.15); }
  .corner.br { bottom: 20px; right: 20px; border-bottom: 1px solid rgba(255,255,255,0.15); border-right: 1px solid rgba(255,255,255,0.15); }

  /* Fade in */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .top-bar { animation: fadeUp 0.8s ease forwards; }
  .main { animation: fadeUp 1s 0.2s ease both; }
  .bottom-bar { animation: fadeUp 0.8s 0.4s ease both; }
</style>
</head>
<body>

<div class="corner tl"></div>
<div class="corner tr"></div>
<div class="corner bl"></div>
<div class="corner br"></div>
<div class="v-rule"></div>
<div class="h-rule"></div>

<div class="container">

  <!-- TOP -->
  <div class="top-bar">
    <div class="logo-mark">
      <svg class="logo-icon" viewBox="0 0 28 28" fill="none" xmlns="http://www.w3.org/2000/svg">
        <circle cx="14" cy="14" r="12" stroke="white" stroke-width="0.8" opacity="0.2"/>
        <circle cx="14" cy="14" r="8" stroke="white" stroke-width="1" opacity="0.45"/>
        <circle cx="14" cy="14" r="4" stroke="white" stroke-width="1.5" opacity="0.85"/>
        <circle cx="14" cy="14" r="1.5" fill="white"/>
        <line x1="14" y1="0" x2="14" y2="8" stroke="white" stroke-width="0.6" opacity="0.25"/>
        <line x1="14" y1="20" x2="14" y2="28" stroke="white" stroke-width="0.6" opacity="0.25"/>
        <line x1="0" y1="14" x2="8" y2="14" stroke="white" stroke-width="0.6" opacity="0.25"/>
        <line x1="20" y1="14" x2="28" y2="14" stroke="white" stroke-width="0.6" opacity="0.25"/>
      </svg>
      <span class="logo-text">Kanon Strategy</span>
    </div>
    <div class="top-right">
      <div class="coord">9.0250° N, 38.7469° E</div>
      <div class="coord">Addis Ababa · UAE · East Africa</div>
    </div>
  </div>

  <!-- MAIN -->
  <div class="main">
    <div class="eyebrow">System initializing</div>
    <h1 class="headline">
      <span class="block">Coming</span>
      <span class="block thin">Soon<span style="color:#2A2A2A">_</span></span>
    </h1>
    <p class="sub">Decision support · Complex environments · East Africa</p>
  </div>

  <!-- BOTTOM -->
  <div class="bottom-bar">
    <div class="bottom-left">
      <span class="contact-line">Inquiries</span>
      <a href="mailto:contact@kanonstrategy.com" class="contact-email">contact@kanonstrategy.com</a>
    </div>
    <div class="bottom-right">
      <div class="status-dot">
        <span class="dot"></span>
        <span>Building</span>
      </div>
      <span class="year">© 2026 Kanon Strategy FZE</span>
    </div>
  </div>

</div>

</body>
</html>
